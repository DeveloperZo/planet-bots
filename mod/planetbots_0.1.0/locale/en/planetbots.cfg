[entity-description]
pb-field-drone-depot=Construction-only. Nauvis early game. Cannot be placed off Nauvis.
pb-field-drone-home=Early construction drone. Slow, short-range, clearly inferior to real bots.
pb-vulcanus-roboport-home=Full Vulcanus bonuses. Best-in-class charging throughput on home planet.
pb-vulcanus-roboport-foreign=Operating off Vulcanus. Reduced charging throughput.
pb-gleba-roboport-home=Full Gleba bonuses. Largest fleet capacity. Best for large sustained swarms.
pb-gleba-roboport-foreign=Operating off Gleba. Reduced fleet capacity.
pb-fulgora-roboport-home=Full Fulgora bonuses. Fastest charging. Lightning-immune structure.
pb-fulgora-roboport-foreign=Operating off Fulgora. Reduced throughput. Lightning immunity retained.
pb-aquilo-roboport-home=Full Aquilo bonuses. Sustained charging under 5x energy drain.
pb-aquilo-roboport-foreign=Operating off Aquilo. Reduced capacity.
pb-vulcanus-logistic-robot-home=3x payload. Hard speed cap. Vulcanus dense hub specialist.
pb-vulcanus-logistic-robot-foreign=2x payload off Vulcanus. Speed cap retained.
pb-vulcanus-construction-robot-home=Heavy construction. 3x payload. Slow but each trip counts.
pb-vulcanus-construction-robot-foreign=Operating off Vulcanus. Payload advantage reduced.
pb-gleba-logistic-robot-home=Endurance logistic. Low idle drain. Best for large sustained swarms.
pb-gleba-logistic-robot-foreign=Operating off Gleba. Efficiency advantage reduced.
pb-gleba-construction-robot-home=Endurance construction. Keeps going where others stall.
pb-gleba-construction-robot-foreign=Operating off Gleba. Efficiency advantage reduced.
pb-fulgora-logistic-robot-home=Fastest logistic bot. Lightning-immune. Low payload — burst, not bulk.
pb-fulgora-logistic-robot-foreign=Operating off Fulgora. Battery reduced. Lightning immunity retained.
pb-fulgora-construction-robot-home=Fastest construction bot. Lightning-immune. Fast repairs, fast building.
pb-fulgora-construction-robot-foreign=Operating off Fulgora. Battery reduced. Lightning immunity retained.
pb-aquilo-logistic-robot-home=9 MJ battery. Best energy efficiency. Viable under Aquilo 5x drain.
pb-aquilo-logistic-robot-foreign=Operating off Aquilo. 6 MJ battery. Efficiency advantage reduced.
pb-aquilo-construction-robot-home=Deep battery construction. Built for Aquilo. Works in sparse-port outposts.
pb-aquilo-construction-robot-foreign=Operating off Aquilo. 6 MJ battery. Efficiency advantage reduced.

