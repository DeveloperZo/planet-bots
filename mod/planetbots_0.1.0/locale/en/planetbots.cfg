[entity-description]
pb-field-drone-depot=Construction-only. Nauvis early game. Cannot be placed off Nauvis.
pb-field-drone-home=Early construction drone. Slow, short-range, clearly inferior to real bots.
pb-vulcanus-construction-robot=Payload 3. Three items per ghost per trip. Best construction bot in the mod. Craftable anywhere — requires Vulcanus supply line (tungsten plate, calcite).
pb-fulgora-logistic-robot=Fastest logistic bot. Lightning-immune. 5 MJ battery survives a full storm blackout mid-flight. Craftable anywhere — requires Fulgora supply line (supercapacitor, holmium plate).
pb-aquilo-roboport=4× charging energy, 2× stations, 70 robot slots. Best roboport in the mod. Craftable anywhere — requires Aquilo supply line (lithium plate, quantum processor).
pb-gleba-compost-chest=Nutrient-fueled spoilage preservation. While fueled: contents spoil at 15% of normal rate. Unfueled: 130% rate. Fuel: 1 nutrient per minute. Slot 1 is locked to nutrients. Craftable anywhere — requires Gleba supply line (bioflux).

