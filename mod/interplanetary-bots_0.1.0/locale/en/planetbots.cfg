[mod-setting-description]
pb-fulgora-lbot-speed=Base flight speed. Vanilla logistic = 0.05.
pb-fulgora-lbot-max-speed=Hard cap after research bonuses. Vanilla logistic = 0.05.
pb-fulgora-lbot-max-energy-mj=Battery capacity in MJ. Vanilla logistic = 1.5.
pb-fulgora-lbot-energy-per-move-kj=Energy cost per tile of movement in kJ. Vanilla = 5.
pb-fulgora-lbot-energy-per-tick-kw=Idle/hover drain in kW. Vanilla = 3.
pb-fulgora-lbot-max-payload=Items carried per trip (before research).
pb-fulgora-lbot-max-payload-after-bonus=Payload cap after worker-robot cargo research. Vanilla = 4.
pb-fulgora-lbot-min-to-charge=Energy fraction below which bot must recharge. Vanilla = 0.2.
pb-fulgora-lbot-max-to-charge=Energy fraction bot charges to before leaving pad. Vanilla = 0.95.
pb-fulgora-lbot-speed-when-empty=Speed multiplier when energy depleted. Vanilla = 0.25.
pb-vulcanus-cbot-speed=Base flight speed. Vanilla construction = 0.06.
pb-vulcanus-cbot-max-speed=Hard cap after research bonuses. Vanilla construction = 0.06.
pb-vulcanus-cbot-max-energy-mj=Battery capacity in MJ. Vanilla construction = 3.
pb-vulcanus-cbot-energy-per-move-kj=Energy cost per tile of movement in kJ. Vanilla = 5.
pb-vulcanus-cbot-energy-per-tick-kw=Idle/hover drain in kW. Vanilla = 0.05.
pb-vulcanus-cbot-max-payload=Items carried per deconstruction trip. Vanilla = 1.
pb-vulcanus-cbot-min-to-charge=Energy fraction below which bot must recharge. Vanilla = 0.2. Also triggers volcanic sprint.
pb-vulcanus-cbot-max-to-charge=Energy fraction bot charges to before leaving pad. Vanilla = 0.95.
pb-vulcanus-cbot-speed-when-empty=Speed multiplier when energy depleted (volcanic sprint). Vanilla = 0.25.
pb-aquilo-port-charging-energy-kw=Charging throughput in kW. Vanilla = 1000.
pb-aquilo-port-charging-stations=Simultaneous charge slots. Vanilla = 4.
pb-aquilo-port-robot-slots=Robot storage slots. Vanilla = 50. (was 7 in pre-SA)
pb-aquilo-port-material-slots=Repair pack / material slots. Vanilla = 4. (was 6 in pre-SA)
pb-aquilo-port-energy-usage-kw=Base energy consumption in kW. Vanilla = 50.
pb-aquilo-port-buffer-capacity-mj=Internal energy buffer in MJ. Vanilla = 100.
pb-aquilo-port-input-flow-mw=Max power draw from grid in MW. Vanilla = 5.
pb-aquilo-port-recharge-minimum-mj=Min stored energy before roboport starts charging bots. Vanilla = 10 (pre-SA = 40).
pb-field-depot-construction-radius=Construction coverage area. Vanilla roboport = 55.
pb-field-depot-build-per-tick=Ghosts built per script tick per depot. Higher = faster building.
pb-field-depot-tick-interval=Ticks between build attempts (60 ticks = 1 second). Lower = more frequent.
pb-field-chest-inventory-size=Number of inventory slots in Field Chests.
