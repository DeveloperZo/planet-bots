[technology-description]
pb-field-drones=Unlocks the Field Drone Depot, Field Chest, and Field Charges. Place a depot, pair it with a Field Chest within range, and load Field Charges as fuel.
pb-field-depot-capacity-1=Increases Field Drone Depot limit to 2 (each with its own chest).
pb-field-depot-capacity-2=Increases Field Drone Depot limit to 3.
pb-field-depot-capacity-3=Increases Field Drone Depot limit to 4.
pb-field-depot-capacity-4=Increases Field Drone Depot limit to 5. Depots can also pull items from player inventory when in range.
pb-vulcanus-robotics=Payload-3 construction robots from Vulcanus. Best construction bot in the mod. Requires tungsten plate and calcite supply from Vulcanus.
pb-fulgora-robotics=Fast lightning-immune logistic robots from Fulgora. Best logistic bot in the mod. Requires supercapacitor and holmium plate supply from Fulgora.
pb-aquilo-robotics=High-throughput roboport from Aquilo. Best roboport in the mod. Unlocks after Vulcanus and Fulgora robotics. Requires lithium plate and quantum processor supply from Aquilo.

